server.port=8080

# Konfigurasi H2 Database
spring.datasource.url=jdbc:h2:mem:tokokuedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Mengaktifkan Console H2 di Browser (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Pengaturan JPA / Hibernate yang AMAN
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Trik Sakti: Masukkan data awal langsung lewat baris properties ini cuk!
spring.jpa.properties.hibernate.default_schema=