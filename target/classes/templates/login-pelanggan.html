<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pelanggan - Toko Kue Jihan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .auth-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        h2 {
            color: #228B22;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #228B22;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background: #006400;
        }
        
        .toggle-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #555;
        }
        
        .toggle-link a {
            color: #228B22;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-home a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<!-- Form Login Pelanggan -->
<div id="loginForm">
    <h2> Login Pelanggan</h2>
    <!-- Tampilkan info error jika gagal -->
    <p th:if="${param.registerSuccess}" style="color: green; text-align: center; font-size: 0.9rem; margin-bottom: 10px;">Pendaftaran Berhasil! Silakan Login.</p>
    <p th:if="${loginError}" style="color: red; text-align: center; font-size: 0.9rem; margin-bottom: 10px;">Email atau Password salah! ❌</p>
    
    <form action="/bakery/api/login" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Masukkan email Anda..." required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Masukkan password..." required>
        </div>
        <button type="submit">Masuk</button>
    </form>
    <div class="toggle-link">
        Belum punya akun? <a onclick="toggleAuth()">Daftar di sini</a>
    </div>
</div>

<!-- Form Registrasi Akun Baru -->
<div id="registerForm" style="display: none;">
    <h2> Daftar Akun Pelanggan</h2>
    <form action="/bakery/api/register" method="post">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="nama" placeholder="Masukkan nama lengkap..." required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Masukkan email aktif..." required>
        </div>
        <div class="form-group">
            <label>Buat Password</label>
            <input type="password" name="password" placeholder="Buat password aman..." required>
        </div>
        <button type="submit">Buat Akun Baru</button>
    </form>
    <div class="toggle-link">
        Sudah punya akun? <a onclick="toggleAuth()">Login di sini</a>
    </div>
</div>

        <div class="back-home">
            <a href="/bakery">⬅️ Kembali ke Dashboard Utama</a>
        </div>
    </div>

    <script>
        // Fungsi untuk berganti tampilan form login <-> register
        function toggleAuth() {
            let login = document.getElementById("loginForm");
            let reg = document.getElementById("registerForm");
            if (login.style.display === "none") {
                login.style.display = "block";
                reg.style.display = "none";
            } else {
                login.style.display = "none";
                reg.style.display = "block";
            }
        }
    </script>
</body>

</html>
