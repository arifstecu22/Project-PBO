<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang - Toko Kue Jihan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1517427294546-5aa121f68e8a?w=1200') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .welcome-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #8B4513;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        
        p {
            color: #555;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }
        
        .btn-admin {
            background: #8B4513;
            color: white;
        }
        
        .btn-admin:hover {
            background: #A0522D;
        }
        
        .btn-pelanggan {
            background: #228B22;
            color: white;
        }
        
        .btn-pelanggan:hover {
            background: #006400;
        }
    </style>
</head>

<body>

    <div class="welcome-container">
        <h1>🧁 TOKO KUE JIHAN</h1>
        <p>Silakan pilih gerbang masuk untuk melanjutkan akses sistem</p>

        <div class="btn-group">
            <a href="/bakery/login-admin" class="btn btn-admin">🔐 Masuk sebagai Admin</a>

            <a href="/bakery/login-pelanggan" class="btn btn-pelanggan">🛒 Masuk sebagai Pelanggan</a>
        </div>
    </div>

</body>

</html>
