<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Toko Kue Jihan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #f4f6f9;
        }
        
        header {
            background: #8B4513;
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1);
        }
        
        .sub-header {
            font-size: 0.9rem;
            color: #f3e5ab;
            margin-top: 5px;
        }
        
        .container {
            width: 95%;
            max-width: 1300px;
            margin: 20px auto;
        }
        
        .menu-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .btn-nav {
            background: #A0522D;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        
        .btn-nav:hover {
            background: #8B4513;
        }
        
        .btn-katalog {
            background: #228B22;
        }
        
        .btn-katalog:hover {
            background: #006400;
        }
        
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, .1);
            margin-bottom: 30px;
        }
        
        .form-container h2 {
            color: #8B4513;
            margin-bottom: 20px;
            border-bottom: 2px solid #8B4513;
            padding-bottom: 5px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .btn-simpan {
            background: #228B22;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-simpan:hover {
            background: #006400;
        }
        
        .btn-batal {
            background: #666;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }
        
        .btn-batal:hover {
            background: #444;
        }
        
        .stock-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .cake-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, .1);
            transition: .3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .cake-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .card-body {
            padding: 15px;
        }
        
        .cake-card h3 {
            margin-bottom: 10px;
            color: #8B4513;
        }
        
        .cake-card p {
            color: #666;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .card-actions {
            padding: 0 15px 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn-perbarui {
            width: 100%;
            border: none;
            background: #8B4513;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-perbarui:hover {
            background: #A0522D;
        }
        
        .btn-hapus {
            width: 100%;
            border: none;
            background: #d9534f;
            color: white;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .btn-hapus:hover {
            background: #c9302c;
        }
    </style>
</head>

<body>
    <header>
        <h1>🧁 ADMIN TOKO KUE JIHAN</h1>
        <div class="sub-header">Sistem Manajemen Terintegrasi H2 Database (Arif, Bintang, Rafly)</div>
    </header>
    <div class="container">
        <div class="menu-nav">
            <a href="/bakery/admin" class="btn-nav">Manajemen Stok & Katalog</a>
            <a href="/bakery/katalog" target="_blank" class="btn-nav btn-katalog">👁️ Lihat Tampilan Pelanggan</a>
            <a href="/bakery" class="btn-nav" style="background: #666;">🚪 Keluar (Logout)</a>
        </div>
        <div class="form-container">
            <h2 id="judulForm">Tambah Produk Roti Baru</h2>
            <form th:action="@{/bakery/simpan}" method="POST">
                <input type="hidden" id="formId" name="idProdukStr" value="">
                <div class="form-group">
                    <label for="formNama">Nama Roti / Kue</label>
                    <input type="text" id="formNama" name="namaProduk" placeholder="Masukkan nama kue..." required>
                </div>
                <div class="form-group">
                    <label for="formHarga">Harga (Rp)</label>
                    <input type="number" id="formHarga" name="harga" placeholder="Contoh: 50000" required>
                </div>
                <div class="form-group">
                    <label for="formStok">Jumlah Stok</label>
                    <input type="number" id="formStok" name="stok" placeholder="Contoh: 20" required>
                </div>
                <button type="submit" class="btn-simpan">💾 Simpan ke Database</button>
                <button type="button" id="btnBatal" class="btn-batal" onclick="batalEdit()">❌ Batal Edit</button>
            </form>
        </div>
        <h2>Daftar Katalog Roti Aktif</h2>
        <div class="stock-container" style="margin-top: 15px;">
            <div class="cake-card" th:each="p : ${daftarProduk}">
                <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?w=800" alt="Foto Kue">
                <div class="card-body">
                    <h3 th:text="${p.namaProduk}">Nama Roti</h3>
                    <p th:text="'Harga : Rp ' + ${p.harga}">Harga: Rp 0</p>
                    <p th:text="'Jumlah Stok : ' + ${p.stok}">Stok: 0</p>
                </div>
                <div class="card-actions">
                    <button class="btn-perbarui" th:onclick="siapkanEdit([[${p.idProduk}]], [[${p.namaProduk}]], [[${p.harga}]], [[${p.stok}]])">🔄 Ambil untuk Edit</button>
                    <a th:href="@{'/bakery/hapus/' + ${p.idProduk}}" class="btn-hapus" onclick="return confirm('Apakah Anda yakin ingin menghapus produk ini?')">🗑️ Hapus</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        function siapkanEdit(id, nama, harga, stok) {
            document.getElementById('formId').value = id;
            document.getElementById('formNama').value = nama;
            document.getElementById('formHarga').value = harga;
            document.getElementById('formStok').value = stok;
            document.getElementById('judulForm').innerText = "Perbarui Data Produk: " + nama;
            document.getElementById('btnBatal').style.display = "inline-block";
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
            alert("Data '" + nama + "' berhasil dimuat!");
        }

        function batalEdit() {
            document.getElementById('formId').value = "";
            document.getElementById('formNama').value = "";
            document.getElementById('formHarga').value = "";
            document.getElementById('formStok').value = "";
            document.getElementById('judulForm').innerText = "Tambah Produk Roti Baru";
            document.getElementById('btnBatal').style.display = "none";
        }
    </script>
</body>

</html>
